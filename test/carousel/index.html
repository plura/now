<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel testbed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="../../src/assets/shared/components/carousel/carousel.css">
  <link rel="stylesheet" href="../common.css">
  <link rel="stylesheet" href="./common.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <main>
    <div id="carousel-host" data-label="cover"></div>
    <div id="carousel-host-slide" data-label="slide"></div>
    <div id="carousel-host-fade" data-label="fade"></div>
    <div id="carousel-host-dots" data-label="cover + indicators"></div>
    <div id="carousel-host-dots-progressive" data-label="cover + indicators scroll"></div>
    <div id="carousel-host-autoplay" data-label="fade + autoplay"></div>
    <div id="carousel-host-loop" data-label="cover + loop + dots"></div>
    <div id="carousel-host-counter" data-label="cover + counter"></div>
    <div id="carousel-host-index" data-label="slide + index 10"></div>
    <div id="carousel-host-on-enter" data-label="on.enter lazy content"></div>
    <div id="carousel-host-thumbs" data-label="cover + thumbs"></div>
    <div id="carousel-host-multi" data-label="slide + perView 3"></div>
    <div id="carousel-host-multi2" data-label="slide + perView 3 + perGroup 3"></div>
    <div id="carousel-host-multi3" data-label="slide + perView 3 + perGroup 3 + gap 30"></div>
    <div id="carousel-host-center" data-label="slide + perView 3 + center"></div>
    <div id="carousel-host-auto" data-label="slide + perView auto + gap 16"></div>
    <div id="carousel-host-auto-center" data-label="slide + perView auto + center + gap 16"></div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script type="module" src="./script.js"></script>

</body>
</html>
