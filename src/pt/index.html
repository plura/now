<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="base-path" content="..">

  <title>Plura — Agência de Design e Desenvolvimento Web</title>
  <meta name="description" content="A Plura cria websites, aplicações web, aplicações móveis e identidades de marca. Fale-nos do seu projecto." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://plura.pt/pt/" />

  <!-- Hreflang -->
  <link rel="alternate" hreflang="pt-PT" href="https://plura.pt/pt/" />
  <link rel="alternate" hreflang="en" href="https://plura.pt/" />
  <link rel="alternate" hreflang="x-default" href="https://plura.pt/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://plura.pt/pt/" />
  <meta property="og:site_name" content="Plura" />
  <meta property="og:title" content="Plura — Agência de Design e Desenvolvimento Web" />
  <meta property="og:description" content="A Plura cria websites, aplicações web, aplicações móveis e identidades de marca. Fale-nos do seu projecto." />
  <meta property="og:locale" content="pt_PT" />
  <meta property="og:locale:alternate" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Plura — Agência de Design e Desenvolvimento Web" />
  <meta name="twitter:description" content="A Plura cria websites, aplicações web, aplicações móveis e identidades de marca. Fale-nos do seu projecto." />

  <link rel="stylesheet" href="../assets/css/main.css" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Plura",
    "url": "https://plura.pt",
    "logo": "https://plura.pt/assets/media/plura-logo.svg",
    "sameAs": [
      "https://instagram.com/plura.pt",
      "https://linkedin.com/company/plura"
    ]
  }
  </script>
</head>
<body>

  <!-- ─── Intro ─────────────────────────────────────────────── -->
  <div id="plura-intro">
    <img src="../assets/media/plura-logo-anim.svg" alt="Plura" class="plura-logo plura-logo--dark" />
  </div>
  <!-- ─── /Intro ────────────────────────────────────────────── -->

  <!-- ─── Stage ─────────────────────────────────────────────── -->
  <div id="plura-stage">
    <header>
      <img src="../assets/media/plura-logo-anim.svg" alt="Plura" class="plura-logo plura-logo--dark" />
      <nav class="plura-social" aria-label="Redes sociais">
        <a href="https://instagram.com/plura.pt" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <img src="../assets/media/icons/instagram.svg" alt="" />
        </a>
        <a href="https://linkedin.com/company/plura" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
          <img src="../assets/media/icons/linkedin.svg" alt="" />
        </a>
        <a href="../" class="plura-lang-toggle" aria-label="Switch to English">EN</a>
      </nav>
    </header>
    <main>
      <div id="plura-content"></div>
    </main>
  </div>
  <!-- ─── /Stage ────────────────────────────────────────────── -->

  <!-- ─── Filter ──────────────────────────────────────────────── -->
  <div class="plura-overlay--backdrop plura-float-main plura-float--projects-filter" id="plura-projects-filter">
    <div class="plura-morph-element plura-float-morph" id="plura-projects-filter-morph" role="dialog" aria-modal="true" aria-label="Filtrar projectos">

      <button class="plura-morph-close" id="plura-projects-filter-close" aria-label="Fechar">
        <i data-lucide="x"></i>
      </button>

      <div class="plura-morph-content plura-projects-filter-panel" id="plura-projects-filter-panel">
        <div class="plura-panel">
          <div class="plura-panel-header">
            <!-- title injected by JS -->
          </div>
          <div class="plura-panel-body">
            <!-- filter options populated dynamically -->
          </div>
        </div>
      </div>

      <button class="plura-float-trigger" id="plura-projects-filter-trigger" aria-expanded="false" aria-haspopup="dialog">
        <i data-lucide="list-filter"></i>
      </button>

    </div>
  </div>
  <!-- ─── /Filter ─────────────────────────────────────────────── -->

  <!-- ─── CTA ───────────────────────────────────────────────── -->
  <div class="plura-overlay--backdrop plura-float-main plura-float--contacts" id="plura-contacts-cta">
    <div class="plura-morph-element plura-float-morph" id="plura-contacts-cta-morph" role="dialog" aria-modal="true" aria-label="Contacte-nos">

      <button class="plura-morph-close" id="plura-contacts-cta-close" aria-label="Fechar">
        <i data-lucide="x"></i>
      </button>

      <div class="plura-morph-content plura-contacts-cta-content">
        <div class="plura-panel">
          <div class="plura-panel-header">
            <span class="plura-panel-title">Contacto</span>
          </div>
          <div class="plura-panel-body">
            <div class="plura-contacts-cta-alert plura-alert" role="alert" aria-live="polite" hidden></div>
            <form class="plura-form" id="plura-contacts-cta-form" novalidate>
              <input type="text" name="botcheck" style="display:none" tabindex="-1" autocomplete="off" />
              <div class="plura-form-field">
                <label for="plura-contacts-cta-name">Nome</label>
                <input type="text" id="plura-contacts-cta-name" name="name" required autocomplete="name" placeholder="O seu nome" />
              </div>
              <div class="plura-form-field">
                <label for="plura-contacts-cta-email">Email</label>
                <input type="email" id="plura-contacts-cta-email" name="email" required autocomplete="email" placeholder="o-seu@email.com" />
              </div>
              <div class="plura-form-field">
                <label for="plura-contacts-cta-phone">Telefone</label>
                <input type="tel" id="plura-contacts-cta-phone" name="phone" autocomplete="tel" placeholder="+351 912 345 678" />
              </div>
              <div class="plura-form-field">
                <label for="plura-contacts-cta-type">Tipo de projecto</label>
                <select id="plura-contacts-cta-type" name="type" required>
                  <option value="" disabled selected>Seleccione…</option>
                  <option value="website">Website</option>
                  <option value="webapp">Aplicação Web</option>
                  <option value="mobile">Aplicação Móvel</option>
                  <option value="design">Design &amp; Identidade</option>
                  <option value="other">Outro</option>
                </select>
              </div>
              <div class="plura-form-field">
                <label for="plura-contacts-cta-message">Mensagem</label>
                <textarea id="plura-contacts-cta-message" name="message" rows="4" required placeholder="Fale-nos do seu projecto"></textarea>
              </div>
              <button type="submit" class="plura-btn plura-form-submit">Enviar</button>
            </form>
          </div>
        </div>
      </div>

      <button class="plura-float-trigger" id="plura-contacts-cta-trigger" aria-expanded="false" aria-haspopup="dialog">
        <i data-lucide="mail"></i>
      </button>

    </div>
  </div>
  <!-- ─── /CTA ─────────────────────────────────────────────── -->

  <!-- ─── Projects carousel overlay ─────────────────────────── -->
  <div id="plura-projects-carousel" role="dialog" aria-modal="true" aria-label="Detalhes do projeto">
    <!-- carousel injected dynamically -->
  </div>
  <!-- ─── /Projects carousel overlay ──────────────────────────── -->

  <!-- ─── Project detail ───────────────────────────────────── -->
  <div class="plura-overlay--backdrop plura-project-detail" id="plura-project-detail">
    <div class="plura-morph-element plura-project-detail-morph" id="plura-project-detail-morph" role="dialog" aria-modal="true">

      <button class="plura-morph-close plura-project-detail-close" id="plura-project-detail-close" aria-label="Fechar">
        <i data-lucide="x"></i>
      </button>

      <div class="plura-morph-content plura-project-detail-content" id="plura-project-detail-content">
        <!-- populated dynamically -->
      </div>

    </div>
  </div>
  <!-- ─── /Project detail ──────────────────────────────────── -->

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
