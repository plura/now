<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="base-path" content="..">
  <title>Plura</title>
  <link rel="alternate" hreflang="en" href="../" />
  <link rel="alternate" hreflang="pt-PT" href="./" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/projects.css" />
  <link rel="stylesheet" href="../assets/css/morph.css" />
  <link rel="stylesheet" href="../assets/css/cta.css" />
</head>
<body>

  <!-- ─── Intro ─────────────────────────────────────────────── -->
  <div id="plura-intro">
    <img src="../assets/media/plura-logo.svg" alt="Plura" class="plura-logo plura-logo--dark" />
  </div>
  <!-- ─── /Intro ────────────────────────────────────────────── -->

  <!-- ─── Stage ─────────────────────────────────────────────── -->
  <div id="plura-stage">
    <header>
      <img src="../assets/media/plura-logo.svg" alt="Plura" class="plura-logo plura-logo--dark" />
      <nav class="plura-social" aria-label="Redes sociais">
        <a href="https://instagram.com/plura.pt" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <img src="../assets/media/icons/instagram.svg" alt="" />
        </a>
        <a href="https://linkedin.com/company/plura" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
          <img src="../assets/media/icons/linkedin.svg" alt="" />
        </a>
        <a href="../" class="plura-lang-toggle" aria-label="Switch to English">EN</a>
      </nav>
    </header>
    <main>
      <div id="plura-content"></div>
    </main>
  </div>
  <!-- ─── /Stage ────────────────────────────────────────────── -->

  <!-- ─── CTA ───────────────────────────────────────────────── -->
  <div class="plura-morph-main plura-cta-main" id="plura-cta-main">
    <div class="plura-morph-element plura-cta-morph" id="plura-cta-morph" role="dialog" aria-modal="true" aria-label="Contacte-nos">

      <div class="plura-cta-form-wrapper">
        <button class="plura-morph-close plura-cta-close" id="plura-cta-close" aria-label="Fechar">
          <i data-lucide="x"></i>
        </button>
        <div class="plura-cta-alert" role="alert" aria-live="polite" hidden></div>
        <form class="plura-cta-form" id="plura-cta-form" novalidate>
          <input type="text" name="botcheck" style="display:none" tabindex="-1" autocomplete="off" />
          <div class="plura-cta-field">
            <label for="plura-cta-name">Nome</label>
            <input type="text" id="plura-cta-name" name="name" required autocomplete="name" placeholder="O seu nome" />
          </div>
          <div class="plura-cta-field">
            <label for="plura-cta-email">Email</label>
            <input type="email" id="plura-cta-email" name="email" required autocomplete="email" placeholder="o-seu@email.com" />
          </div>
          <div class="plura-cta-field">
            <label for="plura-cta-phone">Telefone</label>
            <input type="tel" id="plura-cta-phone" name="phone" autocomplete="tel" placeholder="+351 912 345 678" />
          </div>
          <div class="plura-cta-field">
            <label for="plura-cta-type">Tipo de projecto</label>
            <select id="plura-cta-type" name="type" required>
              <option value="" disabled selected>Seleccione…</option>
              <option value="website">Website</option>
              <option value="webapp">Aplicação Web</option>
              <option value="mobile">Aplicação Móvel</option>
              <option value="design">Design &amp; Identidade</option>
              <option value="other">Outro</option>
            </select>
          </div>
          <div class="plura-cta-field">
            <label for="plura-cta-message">Mensagem</label>
            <textarea id="plura-cta-message" name="message" rows="4" required placeholder="Fale-nos do seu projecto"></textarea>
          </div>
          <button type="submit" class="plura-cta-submit">Enviar</button>
        </form>
      </div>

      <button class="plura-cta-trigger" id="plura-cta-trigger" aria-expanded="false" aria-haspopup="dialog">
        <i data-lucide="mail"></i>
      </button>

    </div>
  </div>
  <!-- ─── /CTA ─────────────────────────────────────────────── -->

  <!-- ─── Project detail ───────────────────────────────────── -->
  <div class="plura-morph-main plura-project-detail-main" id="plura-project-detail-main">
    <div class="plura-morph-element plura-project-detail-morph" id="plura-project-detail-morph" role="dialog" aria-modal="true">

      <button class="plura-morph-close plura-project-detail-close" id="plura-project-detail-close" aria-label="Fechar">
        <i data-lucide="x"></i>
      </button>

      <div class="plura-morph-content plura-project-detail-content" id="plura-project-detail-content">
        <!-- populated dynamically -->
      </div>

    </div>
  </div>
  <!-- ─── /Project detail ──────────────────────────────────── -->

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="../assets/js/main.js"></script>
  <script type="module" src="../assets/js/cta.js"></script>
</body>
</html>
