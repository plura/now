<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Plura — Web Design &amp; Development Agency</title>
  <meta name="description" content="Plura builds websites, web apps, mobile apps and brand identities. Tell us about your project." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://plura.pt/" />

  <!-- Hreflang -->
  <link rel="alternate" hreflang="en" href="https://plura.pt/" />
  <link rel="alternate" hreflang="pt-PT" href="https://plura.pt/pt/" />
  <link rel="alternate" hreflang="x-default" href="https://plura.pt/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://plura.pt/" />
  <meta property="og:site_name" content="Plura" />
  <meta property="og:title" content="Plura — Web Design &amp; Development Agency" />
  <meta property="og:description" content="Plura builds websites, web apps, mobile apps and brand identities. Tell us about your project." />
  <meta property="og:locale" content="en_US" />
  <meta property="og:locale:alternate" content="pt_PT" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Plura — Web Design &amp; Development Agency" />
  <meta name="twitter:description" content="Plura builds websites, web apps, mobile apps and brand identities. Tell us about your project." />

  <link rel="stylesheet" href="assets/css/main.css" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Plura",
    "url": "https://plura.pt",
    "logo": "https://plura.pt/assets/media/plura-logo.svg",
    "sameAs": [
      "https://instagram.com/plura.pt",
      "https://linkedin.com/company/plura"
    ]
  }
  </script>
</head>
<body>

  <!-- ─── Intro ─────────────────────────────────────────────── -->
  <div id="plura-intro">
    <img src="assets/media/plura-logo-anim.svg" alt="Plura" class="plura-logo plura-logo--dark" />
  </div>
  <!-- ─── /Intro ────────────────────────────────────────────── -->

  <!-- ─── Stage ─────────────────────────────────────────────── -->
  <div id="plura-stage">
    <header>
      <img src="assets/media/plura-logo-anim.svg" alt="Plura" class="plura-logo plura-logo--dark" />
      <nav class="plura-social" aria-label="Social media">
        <a href="https://instagram.com/plura.pt" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <img src="assets/media/icons/instagram.svg" alt="" />
        </a>
        <a href="https://linkedin.com/company/plura" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
          <img src="assets/media/icons/linkedin.svg" alt="" />
        </a>
        <a href="pt/" class="plura-lang-toggle" aria-label="Mudar para Português">PT</a>
      </nav>
    </header>
    <main>
      <div id="plura-content"></div>
    </main>
  </div>
  <!-- ─── /Stage ────────────────────────────────────────────── -->

  <!-- ─── Filter ──────────────────────────────────────────────── -->
  <div class="plura-float-main plura-float--projects-filter" id="plura-projects-filter">
    <div class="plura-morph-element plura-float-morph" id="plura-projects-filter-morph" role="dialog" aria-modal="true" aria-label="Filter projects">

      <button class="plura-morph-close" id="plura-projects-filter-close" aria-label="Close">
        <i data-lucide="x"></i>
      </button>

      <div class="plura-morph-content plura-projects-filter-panel" id="plura-projects-filter-panel">
        <div class="plura-panel">
          <div class="plura-panel-header">
            <!-- title injected by JS -->
          </div>
          <div class="plura-panel-body">
            <!-- filter options populated dynamically -->
          </div>
        </div>
      </div>

      <button class="plura-float-trigger" id="plura-projects-filter-trigger" aria-expanded="false" aria-haspopup="dialog">
        <i data-lucide="list-filter"></i>
      </button>

    </div>
  </div>
  <!-- ─── /Filter ─────────────────────────────────────────────── -->

  <!-- ─── CTA ───────────────────────────────────────────────── -->
  <div class="plura-float-main plura-float--contacts" id="plura-contacts-cta">
    <div class="plura-morph-element plura-float-morph" id="plura-contacts-cta-morph" role="dialog" aria-modal="true" aria-label="Contact us">

      <button class="plura-morph-close" id="plura-contacts-cta-close" aria-label="Close">
        <i data-lucide="x"></i>
      </button>

      <div class="plura-morph-content plura-contacts-cta-content">
        <div class="plura-panel">
          <div class="plura-panel-header">
            <span class="plura-panel-title">Contact</span>
          </div>
          <div class="plura-panel-body">
            <div class="plura-contacts-cta-alert plura-alert" role="alert" aria-live="polite" hidden></div>
            <form class="plura-form" id="plura-contacts-cta-form" novalidate>
              <input type="text" name="botcheck" style="display:none" tabindex="-1" autocomplete="off" />
              <div class="plura-form-field">
                <label for="plura-contacts-cta-name">Name</label>
                <input type="text" id="plura-contacts-cta-name" name="name" required autocomplete="name" placeholder="Your name" />
              </div>
              <div class="plura-form-field">
                <label for="plura-contacts-cta-email">Email</label>
                <input type="email" id="plura-contacts-cta-email" name="email" required autocomplete="email" placeholder="your@email.com" />
              </div>
              <div class="plura-form-field">
                <label for="plura-contacts-cta-phone">Phone</label>
                <input type="tel" id="plura-contacts-cta-phone" name="phone" autocomplete="tel" placeholder="+1 234 567 890" />
              </div>
              <div class="plura-form-field">
                <label for="plura-contacts-cta-type">Project type</label>
                <select id="plura-contacts-cta-type" name="type" required>
                  <option value="" disabled selected>Select…</option>
                  <option value="website">Website</option>
                  <option value="webapp">Web App</option>
                  <option value="mobile">Mobile App</option>
                  <option value="design">Design &amp; Branding</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="plura-form-field">
                <label for="plura-contacts-cta-message">Message</label>
                <textarea id="plura-contacts-cta-message" name="message" rows="4" required placeholder="Tell us about your project"></textarea>
              </div>
              <button type="submit" class="plura-btn plura-form-submit">Send</button>
            </form>
          </div>
        </div>
      </div>

      <button class="plura-float-trigger" id="plura-contacts-cta-trigger" aria-expanded="false" aria-haspopup="dialog">
        <i data-lucide="mail"></i>
      </button>

    </div>
  </div>
  <!-- ─── /CTA ─────────────────────────────────────────────── -->

  <!-- ─── Projects carousel overlay ─────────────────────────── -->
  <div id="plura-projects-carousel" role="dialog" aria-modal="true" aria-label="Project details">
    <!-- carousel injected dynamically -->
  </div>
  <!-- ─── /Projects carousel overlay ──────────────────────────── -->

  <!-- ─── Project detail ───────────────────────────────────── -->
  <div class="plura-project-detail" id="plura-project-detail">
    <div class="plura-morph-element plura-project-detail-morph" id="plura-project-detail-morph" role="dialog" aria-modal="true">

      <button class="plura-morph-close plura-project-detail-close" id="plura-project-detail-close" aria-label="Close">
        <i data-lucide="x"></i>
      </button>

      <div class="plura-morph-content plura-project-detail-content" id="plura-project-detail-content">
        <!-- populated dynamically -->
      </div>

    </div>
  </div>
  <!-- ─── /Project detail ──────────────────────────────────── -->

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
